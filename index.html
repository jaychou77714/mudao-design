<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>燈光設計助手 — 內部工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+TC:wght@400;500&family=Outfit:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f5ee;
  --surface: #ffffff;
  --surface-2: #fdfbf6;
  --ink: #1a1816;
  --ink-mid: #4a4640;
  --muted: #807a6e;
  --line: #e6e0d2;
  --line-soft: #efe9da;
  --accent: #b85f23;
  --accent-soft: #ddc7a8;
  --warm: #ef9f27;
  --very-warm: #d85a30;
  --warm-light: #fac775;
  --cool: #5b9ad8;
  --neutral: #b4b0a0;
  --serif: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
  --sans: 'Outfit', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
}
body { min-height: 100vh; }

.shell { max-width: 1180px; margin: 0 auto; padding: 56px 40px 80px; }

.brand {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 64px;
  padding-bottom: 24px;
  border-bottom: 0.5px solid var(--line);
}
.brand-stack { display: flex; flex-direction: column; gap: 8px; }
.mudao-mark {
  font-family: var(--sans);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: 0.36em;
  color: var(--ink);
  padding-left: 1px;
}
.brand-mark {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  font-style: italic;
  color: var(--accent);
}
.brand-mark em {
  font-style: normal;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--muted);
  margin-left: 4px;
  letter-spacing: 0.05em;
}
.brand-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding-top: 4px;
}

.hero { margin-bottom: 56px; max-width: 720px; }
.hero h1 {
  font-family: var(--serif);
  font-size: 52px;
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 18px;
}
.hero h1 em { font-style: italic; color: var(--accent); }
.hero p {
  font-size: 17px;
  color: var(--ink-mid);
  line-height: 1.65;
  max-width: 560px;
}

.upload-card {
  background: var(--surface);
  border: 0.5px solid var(--line);
  border-radius: 4px;
  padding: 0;
  overflow: hidden;
  margin-bottom: 32px;
}

.dropzone {
  padding: 64px 40px;
  text-align: center;
  border-bottom: 0.5px dashed var(--line);
  cursor: pointer;
  transition: background 0.15s;
}
.dropzone:hover { background: var(--surface-2); }
.dropzone.drag { background: var(--surface-2); }
.dropzone-icon {
  width: 44px;
  height: 44px;
  margin: 0 auto 16px;
  border: 0.5px solid var(--line);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
}
.dropzone-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 6px;
}
.dropzone-sub {
  font-size: 13px;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 0.05em;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  border-bottom: 0.5px solid var(--line);
}
.form-row:last-of-type { border-bottom: none; }
.form-row.form-row-full { grid-template-columns: 1fr; }
.form-row.form-row-full .form-field { border-right: none; }
.form-field {
  padding: 18px 24px;
  border-right: 0.5px solid var(--line);
}
.form-field:last-child { border-right: none; }
.form-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 6px;
  display: block;
}
.form-input,
.form-select {
  width: 100%;
  border: none;
  background: transparent;
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 400;
  color: var(--ink);
  padding: 0;
  outline: none;
}
.form-input:focus, .form-select:focus { color: var(--accent); }

.submit-bar {
  background: var(--ink);
  color: var(--surface);
  padding: 18px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: background 0.15s;
  border: none;
  width: 100%;
  font-family: var(--sans);
  font-size: 15px;
  letter-spacing: 0.02em;
}
.submit-bar:hover { background: var(--accent); }
.submit-bar:disabled { background: var(--muted); cursor: not-allowed; }
.submit-bar .arrow { font-family: var(--serif); font-size: 22px; }

.file-info {
  padding: 18px 28px;
  background: var(--surface-2);
  border-bottom: 0.5px solid var(--line);
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 13px;
}
.file-info .ok {
  width: 6px; height: 6px; border-radius: 50%;
  background: #5da66e;
}
.file-info .name { flex: 1; font-weight: 500; }
.file-info .meta { font-family: var(--mono); color: var(--muted); font-size: 11px; }
.file-info .clear {
  border: none; background: transparent; cursor: pointer;
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.file-info .clear:hover { color: var(--accent); }

.notice {
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  padding: 14px 18px;
  font-size: 13px;
  color: var(--ink-mid);
  border-radius: 4px;
  margin-bottom: 24px;
}
.notice strong { font-weight: 500; color: var(--ink); }
.notice .arrow { color: var(--accent); margin: 0 4px; }

.loader {
  text-align: center;
  padding: 100px 0;
}
.loader-mark {
  font-family: var(--serif);
  font-size: 46px;
  font-style: italic;
  color: var(--accent);
  animation: pulse 1.6s ease-in-out infinite;
  display: inline-block;
  margin-bottom: 20px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.96); }
}
.loader p {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 6px;
}
.loader-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.results-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 40px;
  padding-bottom: 28px;
  border-bottom: 0.5px solid var(--line);
}
.results-head h2 {
  font-family: var(--serif);
  font-size: 38px;
  font-weight: 400;
  font-style: italic;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.results-head .subline {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.results-head .reset {
  border: 0.5px solid var(--line);
  background: var(--surface);
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-mid);
  cursor: pointer;
  border-radius: 4px;
}
.results-head .reset:hover { color: var(--accent); border-color: var(--accent); }

.metrics {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  border: 0.5px solid var(--line);
  margin-bottom: 40px;
  background: var(--surface);
}
.metric {
  padding: 18px 22px;
  border-right: 0.5px solid var(--line);
}
.metric:last-child { border-right: none; }
.metric-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 6px;
}
.metric-value {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  line-height: 1.1;
}
.metric-unit {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-left: 4px;
  letter-spacing: 0.05em;
}

.design-notes {
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  padding: 24px 28px;
  margin-bottom: 48px;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.notes-block:not(:last-child) {
  padding-bottom: 16px;
  border-bottom: 0.5px solid var(--line);
}
.design-notes-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 8px;
}
.design-notes p {
  font-family: var(--serif);
  font-size: 19px;
  font-style: italic;
  line-height: 1.5;
  color: var(--ink);
}
.design-notes p.notes-secondary {
  font-size: 16px;
  color: var(--ink-mid);
  font-style: normal;
  font-family: var(--sans);
  line-height: 1.65;
}

.pdf-preview {
  background: var(--surface);
  border: 0.5px solid var(--line);
  padding: 18px;
  margin-bottom: 40px;
  border-radius: 4px;
}
.pdf-preview-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 0.5px solid var(--line-soft);
  flex-wrap: wrap;
  gap: 12px;
}
.pdf-preview-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
}
.overlay-controls {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.overlay-toggle {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-mid);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  user-select: none;
}
.overlay-toggle input { accent-color: var(--accent); cursor: pointer; }
.pdf-stage {
  position: relative;
  display: inline-block;
  max-width: 100%;
  border: 0.5px solid var(--line-soft);
  background: #fff;
  text-align: center;
  width: 100%;
}
.pdf-stage canvas {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 0 auto;
}
.pdf-stage svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.overlay-legend {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px 16px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 0.5px solid var(--line-soft);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-mid);
  letter-spacing: 0.04em;
}
.overlay-legend .legend-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.overlay-legend svg {
  flex-shrink: 0;
}

.section {
  margin-bottom: 56px;
}
.section-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 0.5px solid var(--line);
}
.section-title {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 400;
  font-style: italic;
}
.section-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.zones {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.zone-card {
  background: var(--surface);
  border: 0.5px solid var(--line);
  padding: 22px 24px;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
}
.zone-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 0.5px solid var(--line-soft);
}
.zone-name {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  line-height: 1.2;
  margin-bottom: 3px;
}
.zone-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.zone-mood {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--accent);
  margin-top: 4px;
}

.cct-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.cct-pill.warm { background: rgba(239, 159, 39, 0.12); color: #8a5510; }
.cct-pill.very-warm { background: rgba(216, 90, 48, 0.12); color: #7a2e15; }
.cct-pill.warm-light { background: rgba(250, 199, 117, 0.18); color: #6e4810; }
.cct-pill.cool { background: rgba(91, 154, 216, 0.14); color: #2a4d72; }
.cct-pill.mix { background: rgba(180, 176, 160, 0.18); color: #4a463c; }

.cct-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cct-dot.warm { background: var(--warm); }
.cct-dot.very-warm { background: var(--very-warm); }
.cct-dot.warm-light { background: var(--warm-light); }
.cct-dot.cool { background: var(--cool); }
.cct-dot.mix { background: var(--neutral); }

.zone-specs {
  display: flex;
  gap: 18px;
  font-family: var(--mono);
  font-size: 11px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.zone-spec strong {
  font-family: var(--sans);
  font-weight: 500;
  color: var(--ink);
  font-size: 13px;
  margin-right: 4px;
}
.zone-spec span { color: var(--muted); }

.zone-fixtures {
  border-top: 0.5px solid var(--line-soft);
  padding-top: 14px;
  margin-bottom: 14px;
}
.zone-fixtures-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 10px;
}
.fixture-row {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  margin-bottom: 10px;
  font-size: 13px;
  line-height: 1.5;
}
.fixture-row:last-child { margin-bottom: 0; }
.fixture-type {
  font-weight: 500;
  white-space: nowrap;
}
.fixture-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-left: 4px;
}
.fixture-detail {
  color: var(--ink-mid);
  font-size: 12px;
  line-height: 1.55;
}
.fixture-spec {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  display: block;
  margin-top: 2px;
}

.zone-rationale {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink-mid);
  border-left: 2px solid var(--accent-soft);
  padding-left: 14px;
  margin-bottom: 12px;
}

.zone-ambient {
  background: var(--surface-2);
  border-radius: 3px;
  padding: 12px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink-mid);
}
.zone-ambient-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  margin-bottom: 6px;
  font-weight: 500;
}

.fixture-brands {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  margin-top: 4px;
  letter-spacing: 0.02em;
}
.zone-notes {
  margin: 0;
  padding: 0;
  list-style: none;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}
.zone-notes li {
  padding-left: 14px;
  position: relative;
  margin-bottom: 4px;
}
.zone-notes li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--accent);
}

.cri-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  padding: 1px 6px;
  border-radius: 2px;
  margin-left: 6px;
  color: var(--ink-mid);
}

.error-card {
  background: #fdf6f3;
  border: 0.5px solid #d8a89a;
  padding: 24px 28px;
  border-radius: 4px;
  margin-bottom: 24px;
}
.error-card h3 {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 8px;
  color: #7a2e15;
}
.error-card p { font-size: 14px; color: var(--ink-mid); }
.error-card .retry {
  margin-top: 14px;
  background: var(--ink);
  color: var(--surface);
  border: none;
  padding: 10px 18px;
  font-family: var(--sans);
  font-size: 13px;
  border-radius: 2px;
  cursor: pointer;
}

.footer {
  margin-top: 80px;
  padding-top: 24px;
  border-top: 0.5px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
}
.footer-rights { display: flex; flex-direction: column; gap: 6px; }
.footer-mudao {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.28em;
  color: var(--ink);
}
.footer-restriction {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
  line-height: 1.5;
  max-width: 520px;
}
.footer-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

@media (max-width: 880px) {
  .shell { padding: 32px 20px 60px; }
  .hero h1 { font-size: 36px; }
  .form-row { grid-template-columns: 1fr; }
  .form-field { border-right: none; border-bottom: 0.5px solid var(--line); }
  .form-field:last-child { border-bottom: none; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .metric { border-right: 0.5px solid var(--line); border-bottom: 0.5px solid var(--line); }
  .zones { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="shell">
  <header class="brand">
    <div class="brand-stack">
      <div class="mudao-mark">MUDAO &nbsp; DESIGN</div>
      <div class="brand-mark">◐ Lumière <em>· 燈光設計助手</em></div>
    </div>
    <div class="brand-meta">Internal · v0.3</div>
  </header>

  <div id="app"></div>

  <footer class="footer">
    <div class="footer-rights">
      <div class="footer-mudao">© 2026 MUDAO DESIGN</div>
      <div class="footer-restriction">本工具僅限木島室內設計公司成員使用 · For internal use by Mudao Design team members only</div>
    </div>
    <div class="footer-meta">Lumière · Internal Tool</div>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const state = {
  view: 'upload',
  file: null,
  pdfBase64: null,
  results: null,
  error: null,
  form: {
    ceiling_height: 2.8,
    total_ping: '',
    style: '現代簡約風',
    mode: 'professional',
    has_ceiling: 'yes',
    embedded_light_size: '9.5cm',
    include_track_light: true
  }
};

const app = document.getElementById('app');

function render() {
  if (state.view === 'upload') return renderUpload();
  if (state.view === 'loading') return renderLoading();
  if (state.view === 'results') return renderResults();
  if (state.view === 'error') return renderError();
}

function bindUpload() {
  const dz = document.getElementById('dropzone');
  const input = document.getElementById('file-input');
  const submit = document.getElementById('submit');
  const ceiling = document.getElementById('ceiling');
  const ping = document.getElementById('ping');
  const style = document.getElementById('style');
  const mode = document.getElementById('mode');
  const has_ceiling = document.getElementById('has_ceiling');
  const embedded_light_size = document.getElementById('embedded_light_size');
  const include_track_light = document.getElementById('include_track_light');

  ceiling.addEventListener('input', e => state.form.ceiling_height = parseFloat(e.target.value) || 2.8);
  ping.addEventListener('input', e => state.form.total_ping = e.target.value);
  style.addEventListener('change', e => state.form.style = e.target.value);
  mode.addEventListener('change', e => state.form.mode = e.target.value);
  has_ceiling.addEventListener('change', e => state.form.has_ceiling = e.target.value);
  embedded_light_size.addEventListener('change', e => state.form.embedded_light_size = e.target.value);
  include_track_light.addEventListener('change', e => state.form.include_track_light = e.target.value === 'true');

  dz.addEventListener('click', () => input.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });
  submit.addEventListener('click', () => {
    if (state.pdfBase64) submitAnalysis();
  });
}

async function handleFile(file) {
  if (file.name.toLowerCase().endsWith('.dwg')) {
    showFileInfo({
      name: file.name,
      size: file.size,
      warning: 'DWG 無法直接讀取，請先用 AutoCAD 匯出為 PDF（File → Export → PDF）'
    });
    return;
  }
  if (!file.name.toLowerCase().endsWith('.pdf')) {
    showFileInfo({ name: file.name, size: file.size, warning: '只支援 PDF 檔案' });
    return;
  }
  if (file.size > 4 * 1024 * 1024) {
    showFileInfo({ name: file.name, size: file.size, warning: '檔案超過 4 MB（Vercel Hobby plan 上限），請壓縮 PDF 或匯出較低解析度版本' });
    return;
  }

  state.file = file;
  state.pdfBase64 = await fileToBase64(file);
  showFileInfo({ name: file.name, size: file.size });
  document.getElementById('submit').disabled = false;
}

function showFileInfo({ name, size, warning }) {
  const slot = document.getElementById('file-info-slot');
  const sizeStr = (size / 1024 / 1024).toFixed(2) + ' MB';
  if (warning) {
    slot.innerHTML = `
      <div class="file-info" style="background: #fdf6f3;">
        <div class="ok" style="background: #c66c2a;"></div>
        <div class="name">${escapeHtml(name)}</div>
        <div class="meta" style="color: #7a2e15;">${escapeHtml(warning)}</div>
        <button class="clear" onclick="clearFile()">移除</button>
      </div>
    `;
  } else {
    slot.innerHTML = `
      <div class="file-info">
        <div class="ok"></div>
        <div class="name">${escapeHtml(name)}</div>
        <div class="meta">${sizeStr} · 已就緒</div>
        <button class="clear" onclick="clearFile()">更換</button>
      </div>
    `;
  }
}

function clearFile() {
  state.file = null;
  state.pdfBase64 = null;
  document.getElementById('file-info-slot').innerHTML = '';
  document.getElementById('submit').disabled = true;
  document.getElementById('file-input').value = '';
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function submitAnalysis() {
  state.view = 'loading';
  render();
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pdf_base64: state.pdfBase64,
        ceiling_height: state.form.ceiling_height,
        total_ping: state.form.total_ping,
        style: state.form.style,
        mode: state.form.mode,
        has_ceiling: state.form.has_ceiling,
        embedded_light_size: state.form.embedded_light_size,
        include_track_light: state.form.include_track_light
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '分析失敗');
    state.results = data;
    state.view = 'results';
    render();
    setTimeout(renderPdfPreview, 100);
  } catch (err) {
    state.error = err.message;
    state.view = 'error';
    render();
  }
}

function renderZoneCard(zone) {
  const cct = classifyCct(zone.color_temp_k);
  const fixtures = (zone.fixtures || []).map(f => {
    const brandLine = (f.brand_suggestions && f.brand_suggestions.length)
      ? `<div class="fixture-brands">建議品牌：${f.brand_suggestions.map(escapeHtml).join(' · ')}${f.coverage_ping ? ` · 適用 ${escapeHtml(f.coverage_ping)}` : ''}</div>`
      : '';
    return `
      <div class="fixture-row">
        <div class="fixture-type">${escapeHtml(f.type)}<span class="fixture-count">×${f.count}</span></div>
        <div>
          <div class="fixture-detail">${escapeHtml(f.placement || '')}</div>
          <span class="fixture-spec">${escapeHtml(f.spec || '')}</span>
          ${brandLine}
        </div>
      </div>
    `;
  }).join('');

  const notes = (zone.notes || []).map(n => `<li>${escapeHtml(n)}</li>`).join('');

  const ambient = zone.ambient_suggestions && zone.ambient_suggestions.trim()
    ? `<div class="zone-ambient"><div class="zone-ambient-label">氛圍燈建議</div>${escapeHtml(zone.ambient_suggestions)}</div>`
    : '';

  return `
    <div class="zone-card">
      <div class="zone-head">
        <div>
          <div class="zone-name">${escapeHtml(zone.name)}</div>
          <div class="zone-sub">${zone.area_ping} 坪 · ${escapeHtml(zone.use)}</div>
          ${zone.mood ? `<div class="zone-mood">${escapeHtml(zone.mood)}</div>` : ''}
        </div>
        <div class="cct-pill ${cct}">
          <span class="cct-dot ${cct}"></span>${escapeHtml(zone.color_temp_k)}
        </div>
      </div>

      <div class="zone-specs">
        <div class="zone-spec"><strong>${escapeHtml(zone.lux)}</strong><span>lux</span></div>
        <div class="zone-spec"><strong>${formatNum(zone.lumens)}</strong><span>lm</span></div>
        <div class="zone-spec"><strong>${zone.watts}</strong><span>W</span></div>
        <div class="zone-spec"><span>CRI</span><span class="cri-tag">${escapeHtml(zone.cri)}</span></div>
      </div>

      ${fixtures ? `<div class="zone-fixtures"><div class="zone-fixtures-label">燈具配置</div>${fixtures}</div>` : ''}

      ${zone.rationale ? `<div class="zone-rationale">${escapeHtml(zone.rationale)}</div>` : ''}

      ${ambient}

      ${notes ? `<ul class="zone-notes">${notes}</ul>` : ''}
    </div>
  `;
}

function classifyCct(s) {
  if (!s) return 'mix';
  const t = s.toString();
  if (t.includes('+') || t.includes(',') || t.includes('—')) return 'mix';
  const k = parseInt(t.replace(/\D/g, ''));
  if (k <= 2300) return 'very-warm';
  if (k <= 2800) return 'warm';
  if (k <= 3200) return 'warm-light';
  return 'cool';
}

async function renderPdfPreview() {
  if (!state.pdfBase64) return;
  const canvas = document.getElementById('pdf-canvas');
  if (!canvas) return;
  try {
    const data = atob(state.pdfBase64);
    const bytes = new Uint8Array(data.length);
    for (let i = 0; i < data.length; i++) bytes[i] = data.charCodeAt(i);
    const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 1.6 });
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;

    renderFixtureOverlay(viewport.width, viewport.height);
    renderOverlayLegend();
    bindOverlayToggles();
  } catch (err) {
    console.error('PDF preview failed', err);
  }
}

const CCT_COLORS = {
  'very-warm': '#d85a30',
  'warm': '#ef9f27',
  'warm-light': '#fac775',
  'cool': '#5b9ad8',
  'mix': '#9b8a6e'
};

const FIXTURE_TYPES_USED = new Set();

function renderFixtureOverlay(w, h) {
  const svg = document.getElementById('fixture-overlay');
  if (!svg || !state.results) return;
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  FIXTURE_TYPES_USED.clear();

  const showZones = document.getElementById('show-zones')?.checked ?? true;
  const showFixtures = document.getElementById('show-fixtures')?.checked ?? true;
  const showLabels = document.getElementById('show-labels')?.checked ?? false;

  let zonesSvg = '';
  let fixturesSvg = '';
  let labelsSvg = '';

  (state.results.zones || []).forEach((zone, zi) => {
    const cct = classifyCct(zone.color_temp_k);
    const color = CCT_COLORS[cct] || CCT_COLORS.warm;

    if (zone.bounds) {
      const bx = (zone.bounds.x / 100) * w;
      const by = (zone.bounds.y / 100) * h;
      const bw = (zone.bounds.w / 100) * w;
      const bh = (zone.bounds.h / 100) * h;
      zonesSvg += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="${color}" fill-opacity="0.06" stroke="${color}" stroke-opacity="0.45" stroke-width="1" stroke-dasharray="4 3" rx="2"/>`;
      labelsSvg += `<text x="${bx + 6}" y="${by + 14}" font-size="11" font-family="-apple-system, sans-serif" fill="${color}" font-weight="500" opacity="0.85">${escapeXml(zone.name)}</text>`;
    }

    (zone.fixtures || []).forEach((fix) => {
      FIXTURE_TYPES_USED.add(fix.type);
      const positions = fix.positions || [];

      if (fix.type === '燈帶' || fix.type === '線形燈') {
        for (let i = 0; i < positions.length - 1; i += 2) {
          const p1 = positions[i];
          const p2 = positions[i + 1];
          if (!p1 || !p2) continue;
          const x1 = (p1.x / 100) * w;
          const y1 = (p1.y / 100) * h;
          const x2 = (p2.x / 100) * w;
          const y2 = (p2.y / 100) * h;
          fixturesSvg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="3" stroke-linecap="round" opacity="0.85"/>`;
        }
        if (positions.length === 1) {
          const p = positions[0];
          const cx = (p.x / 100) * w;
          const cy = (p.y / 100) * h;
          fixturesSvg += renderFixtureSymbol(fix.type, cx, cy, color);
        }
      } else {
        positions.forEach((p) => {
          const cx = (p.x / 100) * w;
          const cy = (p.y / 100) * h;
          fixturesSvg += renderFixtureSymbol(fix.type, cx, cy, color);
        });
      }
    });
  });

  let html = '';
  if (showZones) html += zonesSvg;
  if (showFixtures) html += fixturesSvg;
  if (showLabels) html += labelsSvg;
  svg.innerHTML = html;
}

function renderFixtureSymbol(type, x, y, color) {
  switch (type) {
    case '嵌燈':
      return `<circle cx="${x}" cy="${y}" r="5" fill="${color}" stroke="#fff" stroke-width="1"/>`;
    case '軌道燈':
      return `<rect x="${x - 4}" y="${y - 4}" width="8" height="8" fill="${color}" stroke="#fff" stroke-width="1"/>`;
    case '吊燈':
      return `<polygon points="${x},${y - 6} ${x + 6},${y} ${x},${y + 6} ${x - 6},${y}" fill="${color}" stroke="#fff" stroke-width="1"/>`;
    case '壁燈':
      return `<rect x="${x - 3}" y="${y - 6}" width="6" height="12" fill="${color}" rx="1" stroke="#fff" stroke-width="0.8"/>`;
    case '吸頂燈':
      return `<circle cx="${x}" cy="${y}" r="7" fill="${color}" fill-opacity="0.25" stroke="${color}" stroke-width="1.5"/>
              <circle cx="${x}" cy="${y}" r="2" fill="${color}"/>`;
    case '落地燈':
    case '立燈':
      return `<circle cx="${x}" cy="${y}" r="6" fill="none" stroke="${color}" stroke-width="2"/>
              <circle cx="${x}" cy="${y}" r="2" fill="${color}"/>`;
    case '桌燈':
      return `<polygon points="${x},${y - 5} ${x + 4},${y + 3} ${x - 4},${y + 3}" fill="${color}" stroke="#fff" stroke-width="0.8"/>`;
    case '鏡前燈':
      return `<rect x="${x - 12}" y="${y - 1.5}" width="24" height="3" fill="${color}" rx="1.5"/>`;
    default:
      return `<circle cx="${x}" cy="${y}" r="4" fill="${color}"/>`;
  }
}

const LEGEND_ORDER = ['嵌燈', '軌道燈', '吊燈', '吸頂燈', '燈帶', '線形燈', '壁燈', '落地燈', '立燈', '桌燈', '鏡前燈'];

function renderOverlayLegend() {
  const wrap = document.getElementById('overlay-legend');
  if (!wrap) return;
  const items = [];
  LEGEND_ORDER.forEach((type) => {
    if (FIXTURE_TYPES_USED.has(type)) {
      items.push(`
        <div class="legend-row">
          <svg width="16" height="16" viewBox="0 0 16 16">${renderFixtureSymbol(type, 8, 8, '#1a1816')}</svg>
          <span>${type}</span>
        </div>
      `);
    }
  });
  const cctRow = `
    <div class="legend-row" style="grid-column: 1 / -1; padding-top: 6px; border-top: 0.5px dashed var(--line-soft); font-size: 10px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap;">
      <span style="display:inline-flex;align-items:center;gap:5px;"><span style="display:inline-block;width:10px;height:10px;background:${CCT_COLORS['very-warm']};border-radius:50%;"></span>2200K 微醺</span>
      <span style="display:inline-flex;align-items:center;gap:5px;"><span style="display:inline-block;width:10px;height:10px;background:${CCT_COLORS.warm};border-radius:50%;"></span>2700K 暖白</span>
      <span style="display:inline-flex;align-items:center;gap:5px;"><span style="display:inline-block;width:10px;height:10px;background:${CCT_COLORS['warm-light']};border-radius:50%;"></span>3000K 暖中</span>
      <span style="display:inline-flex;align-items:center;gap:5px;"><span style="display:inline-block;width:10px;height:10px;background:${CCT_COLORS.cool};border-radius:50%;"></span>4000K 中性</span>
    </div>
  `;
  wrap.innerHTML = items.join('') + cctRow;
}

function bindOverlayToggles() {
  ['show-zones', 'show-fixtures', 'show-labels'].forEach((id) => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('change', () => {
        const canvas = document.getElementById('pdf-canvas');
        if (canvas) renderFixtureOverlay(canvas.width, canvas.height);
      });
    }
  });
}

function escapeXml(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&apos;'
  }[c]));
}

function escapeHtml(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function formatNum(n) {
  if (n === undefined || n === null) return '0';
  return Number(n).toLocaleString('en-US');
}

window.clearFile = clearFile;
window.reset = reset;

render();
</script>
